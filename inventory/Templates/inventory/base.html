<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Hệ thống hỗ trợ quyết định tồn kho</title>
 <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <!-- Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        :root {
            --bg-1: #f2f7fa;
            --bg-2: #eef8f5;
            --bg-3: #f4fbf8;
            --ink: #1f3442;
            --muted: #617887;
            --panel: rgba(255, 255, 255, 0.9);
            --line: rgba(147, 165, 176, 0.26);
            --shadow: 0 18px 40px rgba(39, 62, 80, 0.11);
            --nav-bg: linear-gradient(180deg, #203647 0%, #2a4b5f 100%);
            --accent-1: linear-gradient(135deg, #4f7ea1, #6b98b7);
            --accent-2: linear-gradient(135deg, #3f8792, #62aab1);
            --accent-3: linear-gradient(135deg, #4d8f78, #74b095);
            --accent-4: linear-gradient(135deg, #5a8aa6, #77abbe);
            --accent-warm: linear-gradient(135deg, #427c9a, #5f9eba);
            --accent-alert: linear-gradient(135deg, #4a8f74, #6eb190);
            --table-head-bg: linear-gradient(135deg, #294252, #3f6b7f);
            --table-th: #314a5b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(107, 152, 183, 0.16), transparent 22%),
                radial-gradient(circle at bottom right, rgba(116, 176, 149, 0.14), transparent 24%),
                linear-gradient(135deg, var(--bg-1) 0%, var(--bg-3) 48%, var(--bg-2) 100%);
            color: var(--ink);
        }

        .sidebar {
            width: 250px;
            background: var(--nav-bg);
            color: white;
            min-height: 100vh;
            padding: 24px 18px;
            position: sticky;
            top: 0;
            transition: width 0.24s ease, padding 0.24s ease;
            overflow: hidden;
        }

        .sidebar-brand {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 28px;
            padding: 8px 10px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .sidebar-brand-text {
            min-width: 0;
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        .sidebar-brand h2 {
            margin: 0 0 8px;
            font-size: 30px;
            letter-spacing: 1px;
        }

        .sidebar-brand p {
            margin: 0;
            color: rgba(255, 255, 255, 0.76);
            line-height: 1.5;
            font-size: 13px;
        }

        .sidebar-toggle {
            width: 42px;
            height: 42px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex: 0 0 auto;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .sidebar-toggle:hover {
            background: rgba(255, 255, 255, 0.14);
            transform: translateY(-1px);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
            padding: 12px 14px;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 700;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .sidebar a i {
            width: 20px;
            text-align: center;
            font-size: 16px;
            flex: 0 0 auto;
        }

        .sidebar a span {
            transition: opacity 0.18s ease, transform 0.18s ease;
            white-space: nowrap;
        }

        .sidebar a:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(2px);
        }

        .sidebar a.active {
            background: linear-gradient(135deg, rgba(84, 119, 146, 0.96), rgba(111, 145, 166, 0.96));
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.18);
        }

        .main {
            flex: 1;
            padding: 26px;
            transition: padding 0.24s ease;
        }

        body.sidebar-collapsed .sidebar {
            width: 88px;
            padding: 24px 12px;
        }

        body.sidebar-collapsed .sidebar-brand {
            display: flex;
            padding-left: 0;
            padding-right: 0;
            text-align: center;
            justify-content: center;
            align-items: center;
            margin-left: -21px;
        }

        body.sidebar-collapsed .sidebar-brand-text,
        body.sidebar-collapsed .sidebar a span {
            opacity: 0;
            transform: translateX(-8px);
            width: 0;
            overflow: hidden;
            pointer-events: none;
        }

        body.sidebar-collapsed .sidebar-nav {
            align-items: center;
        }

        body.sidebar-collapsed .sidebar a {
            justify-content: center;
            width: 100%;
            padding-left: 0;
            padding-right: 0;
        }

        body.sidebar-collapsed .sidebar-toggle {
            display: inline-flex;
            margin: 0 auto;
        }

        .topbar {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .topbar-greeting {
            display: inline-flex;
            align-items: center;
            padding: 10px 16px;
            border-radius: 999px;
            background: linear-gradient(135deg, #c45353, #de6b6b);
            color: #fff;
            font-weight: 700;
            box-shadow: 0 10px 22px rgba(196, 83, 83, 0.2);
        }

        .topbar-action {
            display: inline-flex;
            align-items: center;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--ink);
            text-decoration: none;
            font-weight: 700;
            border: 1px solid #d8e2ef;
            box-shadow: 0 10px 22px rgba(79, 126, 161, 0.08);
        }

        .page-shell {
            max-width: 1360px;
            margin: 0 auto;
        }

        .page-hero {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 18px;
            margin-bottom: 22px;
            padding: 24px 26px;
            border-radius: 26px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.86), rgba(255, 255, 255, 0.65));
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.58);
        }

        .page-title {
            margin: 0 0 8px;
            font-size: 34px;
            color: var(--ink);
        }

        .page-subtitle {
            margin: 0;
            max-width: 760px;
            color: var(--muted);
            line-height: 1.6;
        }

        .hero-badge {
            padding: 11px 16px;
            border-radius: 999px;
            color: #fff;
            font-weight: 700;
            white-space: nowrap;
            background: var(--accent-1);
            box-shadow: 0 12px 26px rgba(79, 126, 161, 0.22);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 18px;
            margin-bottom: 22px;
        }

        .stat-card {
            padding: 20px 22px;
            border-radius: 22px;
            color: #fff;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: "";
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            right: -26px;
            top: -30px;
            background: rgba(255, 255, 255, 0.14);
        }

        .stat-card h3 {
            margin: 0 0 12px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .stat-card p {
            margin: 0;
            font-size: 34px;
            font-weight: 800;
        }

        .stat-orange { background: var(--accent-1); }
        .stat-blue { background: var(--accent-2); }
        .stat-green { background: var(--accent-3); }
        .stat-purple { background: var(--accent-4); }

        .content-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 22px;
            margin-bottom: 22px;
        }

        .panel {
            background: var(--panel);
            border-radius: 24px;
            padding: 22px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
        }

        .panel-title {
            margin: 0 0 14px;
            font-size: 24px;
            color: var(--ink);
        }

        .panel-subtitle {
            margin: -4px 0 16px;
            color: var(--muted);
            line-height: 1.55;
        }

        .control-form {
            display: grid;
            gap: 12px;
        }

        .control-row {
            display: flex;
            gap: 12px;
            align-items: end;
            flex-wrap: wrap;
        }

        .field {
            display: grid;
            gap: 8px;
            flex: 1;
            min-width: 180px;
        }

        .field label {
            color: var(--ink);
            font-weight: 700;
            font-size: 14px;
        }

        .input,
        .control-form input,
        .control-form select,
        .control-form button,
        .search-box {
            width: 100%;
            border-radius: 14px;
            border: 1px solid #d8e2ef;
            padding: 12px 14px;
            font-size: 15px;
            background: #fff;
        }

        .control-form button,
        .btn-primary,
        .btn-secondary {
            border: none;
            color: #fff;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--accent-1) !important;
            box-shadow: 0 12px 22px rgba(79, 126, 161, 0.22);
        }

        .btn-secondary {
            background: var(--accent-2) !important;
            box-shadow: 0 12px 22px rgba(63, 135, 146, 0.2);
        }

        .info-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 999px;
            background-color: white;
            color: #b91c1c;
            font-size: 13px;
            font-weight: 600;
        }

        .table-card {
            background: rgba(255, 255, 255, 0.92);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow);
            margin-bottom: 22px;
        }

        .table-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 14px;
            padding: 18px 20px;
            color: #fff;
            background: var(--accent-1);
        }

        .table-head h2,
        .table-head h3 {
            margin: 0;
            font-size: 22px;
        }

        .table-head p {
            margin: 4px 0 0;
            color: rgba(255, 255, 255, 0.82);
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
        }

        th {
            background: var(--table-th);
            color: white;
            padding: 14px;
            font-size: 14px;
            white-space: nowrap;
        }

        td {
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #edf2f7;
            background: rgba(255, 255, 255, 0.96);
            white-space: nowrap;
        }

        tr:nth-child(even) td {
            background: #f8fbff;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 72px;
            padding: 6px 10px;
            border-radius: 999px;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
        }

        .badge-ok {
            background: linear-gradient(135deg, #5f8a67, #7ca184);
        }

        .badge-low {
            background: linear-gradient(135deg, #c45353, #de6b6b);
        }

        .badge-a {
            background: linear-gradient(135deg, #416f95, #5f92b6);
        }

        .badge-b {
            background: linear-gradient(135deg, #4e8b90, #69abb0);
            color: #ffffff;
        }

        .badge-c {
            background: linear-gradient(135deg, #4f8e74, #72b08f);
        }

        .link-danger {
            color: #e11d48;
            font-weight: 700;
            text-decoration: none;
        }

        .link-danger:hover {
            text-decoration: underline;
        }

        .muted-text {
            color: var(--muted);
        }

        .empty-state {
            padding: 30px;
            text-align: center;
            color: var(--muted);
        }

        .select2-container {
            width: 100% !important;
        }

        .select2-container .select2-selection--single {
            height: 48px;
            border-radius: 14px;
            border: 1px solid #d8e2ef;
            display: flex;
            align-items: center;
            padding: 0 6px;
        }

        .select2-container--default .select2-selection--single .select2-selection__rendered {
            line-height: 46px;
            color: var(--ink);
        }

        .select2-container--default .select2-selection--single .select2-selection__arrow {
            height: 46px;
        }

        @media (max-width: 980px) {
            body {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                min-height: auto;
                position: static;
            }

            .sidebar-nav {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            }

            body.sidebar-collapsed .sidebar {
                width: 100%;
                padding: 24px 18px;
            }

            body.sidebar-collapsed .sidebar-brand {
                display: flex;
                justify-content: space-between;
                padding-left: 10px;
                padding-right: 10px;
                text-align: left;
            }

            body.sidebar-collapsed .sidebar-brand-text,
            body.sidebar-collapsed .sidebar a span {
                opacity: 1;
                transform: none;
                width: auto;
                overflow: visible;
                pointer-events: auto;
            }

            body.sidebar-collapsed .sidebar a {
                justify-content: flex-start;
                padding-left: 14px;
                padding-right: 14px;
            }

            .main {
                padding: 18px;
            }

            .page-hero {
                flex-direction: column;
            }
        }

        @media (max-width: 640px) {
            .page-title {
                font-size: 28px;
            }

            .page-hero,
            .panel {
                padding: 18px;
                border-radius: 20px;
            }

            .table-head {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>

<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <div class="sidebar-brand-text">
            <h2>STRATIX</h2>
            <p>Inventory DSS</p>
        </div>
        <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Thu gọn hoặc mở rộng sidebar" title="Thu gọn hoặc mở rộng sidebar">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <div class="sidebar-nav">
        <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
            <i class="fas fa-chart-pie"></i>
            <span>Tổng quan</span>
        </a>
        <a href="{% url 'product-list' %}" class="{% if request.resolver_match.url_name == 'product-list' %}active{% endif %}">
            <i class="fas fa-box-open"></i>
            <span>Sản phẩm</span>
        </a>
        <a href="{% url 'material-list' %}" class="{% if request.resolver_match.url_name == 'material-list' %}active{% endif %}">
            <i class="fas fa-cubes"></i>
            <span>Nguyên vật liệu</span>
        </a>
        <a href="{% url 'alert' %}" class="{% if request.resolver_match.url_name == 'alert' %}active{% endif %}">
            <i class="fas fa-bell"></i>
            <span>Cảnh báo</span>
        </a>
        <a href="{% url 'forecast' %}" class="{% if request.resolver_match.url_name == 'forecast' %}active{% endif %}">
            <i class="fas fa-chart-line"></i>
            <span>Dự báo</span>
        </a>
        <a href="{% url 'abc' %}" class="{% if request.resolver_match.url_name == 'abc' %}active{% endif %}">
            <i class="fas fa-layer-group"></i>
            <span>Phân tích ABC</span>
        </a>
    </div>

</div>

<div class="main">
    <div class="page-shell">
        <div class="topbar">
            <div class="topbar-greeting">Xin chào {{ request.session.display_name|default:"Admin" }}</div>
            <a href="{% url 'logout' %}" class="topbar-action">Đăng xuất</a>
        </div>
        {% block content %}
        {% endblock %}
    </div>
</div>
<script>
$(document).ready(function() {
    $('.searchable').select2();
});

(function() {
    const storageKey = 'inventory_sidebar_collapsed';
    const body = document.body;
    const toggleButton = document.getElementById('sidebarToggle');

    if (!toggleButton) {
        return;
    }

    if (window.localStorage.getItem(storageKey) === 'true' && window.innerWidth > 980) {
        body.classList.add('sidebar-collapsed');
    }

    toggleButton.addEventListener('click', function() {
        if (window.innerWidth <= 980) {
            return;
        }

        body.classList.toggle('sidebar-collapsed');
        window.localStorage.setItem(storageKey, body.classList.contains('sidebar-collapsed'));
    });

    window.addEventListener('resize', function() {
        if (window.innerWidth <= 980) {
            body.classList.remove('sidebar-collapsed');
        } else if (window.localStorage.getItem(storageKey) === 'true') {
            body.classList.add('sidebar-collapsed');
        }
    });
})();
</script>
{% block extra_scripts %}{% endblock %}
</body>
</html>
